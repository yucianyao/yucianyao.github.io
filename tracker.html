<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YUAN HW Tracker</title>
<style>
:root{
  --ink:#0f1923;--paper:#f5f3ee;--paper2:#edeae3;--line:#d8d4cb;
  --accent:#c8392b;--green:#2d6a4f;--blue:#1a3a5c;--gold:#c9960c;
  --text:#1e2d3d;--text2:#5a6677;--text3:#8a97a8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--paper);color:var(--text);height:100vh;overflow:hidden;display:flex}
#sidebar{width:210px;flex-shrink:0;background:var(--ink);color:#fff;display:flex;flex-direction:column;height:100vh}
.logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-t{font-size:17px;font-weight:800;letter-spacing:1px;color:#fff}
.logo-s{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;margin-top:2px}
.sb-sec{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.22);padding:14px 16px 5px;text-transform:uppercase}
.sb-btn{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.55);transition:all .12s;border-left:3px solid transparent;border:none;background:none;width:100%;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-btn.on{background:rgba(200,57,43,.18);color:#fff;border-left:3px solid var(--accent)}
.sb-foot{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);font-size:9px;color:rgba(255,255,255,.2);line-height:1.7}
.sb-foot a{color:rgba(200,100,90,.8);cursor:pointer;text-decoration:none}
#gs-st{margin-top:3px;font-size:8px}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
#hdr{background:#fff;border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-title{font-size:18px;font-weight:800;color:var(--ink)}
.hdr-sub{font-size:10px;color:var(--text3);margin-top:1px}
.hdr-r{margin-left:auto;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.btn{padding:6px 13px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--line);background:var(--paper);color:var(--text2);transition:all .12s;font-family:inherit}
.btn:hover{background:var(--paper2)}
.btn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.pri:hover{background:#b5301f}
#body{flex:1;overflow-y:auto;padding:18px 20px}
.pg{display:none}.pg.on{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px;margin-bottom:18px}
.card{background:#fff;border:1px solid var(--line);border-radius:7px;padding:13px 15px}
.card-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.card-num{font-size:30px;font-weight:800;line-height:1}
.card.blue .card-num{color:var(--blue)}.card.red .card-num{color:var(--accent)}
.card.green .card-num{color:var(--green)}.card.gold .card-num{color:var(--gold)}
.sec-t{font-size:14px;font-weight:700;margin-bottom:9px;color:var(--ink)}
.fbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.fbar select,.fbar input{font-size:12px;padding:5px 9px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--text);font-family:inherit}
.fbar input{width:180px}
.cnt{font-size:10px;color:var(--text3)}
.tblw{background:#fff;border:1px solid var(--line);border-radius:7px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--ink);color:rgba(255,255,255,.78);padding:8px 11px;text-align:left;font-size:10px;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:2}
tr.row{border-bottom:1px solid var(--line);cursor:pointer;transition:background .08s}
tr.row:hover{background:var(--paper)}
td{padding:7px 11px;vertical-align:middle}
.tid{font-size:10px;color:var(--text3);font-family:'Courier New',monospace;white-space:nowrap}
.tmod{font-weight:600}.tver{font-size:9px;color:var(--text3);margin-top:1px}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;white-space:nowrap;font-weight:600}
.cbadge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap;font-weight:600}
.pcard{background:#fff;border:1px solid var(--line);border-radius:7px;padding:14px;margin-bottom:10px;cursor:pointer;transition:box-shadow .12s}
.pcard:hover{box-shadow:0 3px 10px rgba(0,0,0,.08)}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:200;align-items:center;justify-content:center}
#ov.on{display:flex}
#modal{background:#fff;border-radius:9px;width:min(640px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 16px 50px rgba(0,0,0,.28)}
.mhdr{padding:18px 22px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#fff;z-index:2}
.mid{font-size:10px;color:var(--text3);font-family:'Courier New',monospace}
.mtitle{font-size:15px;font-weight:700;margin-top:3px}
.mcls{font-size:22px;color:var(--text3);cursor:pointer;line-height:1}
.mcls:hover{color:var(--text)}
.mbody{padding:18px 22px}
.msec{margin-bottom:16px}
.msec-t{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--line)}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px}
.mf label{font-size:10px;color:var(--text3);display:block;margin-bottom:2px}
.mf .v{font-size:13px;font-weight:600}
.mf .e{font-size:11px;color:var(--text3);font-style:italic}
.tl{display:flex;align-items:center;overflow-x:auto;padding:6px 0;gap:0}
.tli{display:flex;flex-direction:column;align-items:center;min-width:68px}
.tld{width:11px;height:11px;border-radius:50%;background:var(--line);border:2px solid var(--line)}
.tld.done{background:var(--green);border-color:var(--green)}
.tll{height:2px;flex:1;background:var(--line);min-width:14px;align-self:center}
.tll.done{background:var(--green)}
.tln{font-size:8px;color:var(--text3);margin-top:4px;text-align:center;line-height:1.3}
.tlt{font-size:8px;color:var(--text2);margin-top:2px;font-family:'Courier New',monospace}
input[type=text],input[type=date],select,textarea{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:4px;font-size:16px;font-family:inherit;background:#fff}
textarea{resize:vertical}
@media(max-width:680px){
  #sidebar{display:none}
  #mnav{display:flex!important}
  body{padding-bottom:60px}
  #main{height:calc(100vh - 60px)}
  #body{padding:12px 12px}
  th:nth-child(n+5),td:nth-child(n+5){display:none}
  .mni{font-size:8px;padding:6px 2px}
  .mni span:first-child{font-size:16px}
  table{font-size:11px}
  th{padding:6px 8px;font-size:9px}
  td{padding:5px 8px}
  .card-num{font-size:24px}
  .cards{grid-template-columns:repeat(3,1fr)}
  #inbox-input{min-height:100px;font-size:16px}
  .fbar select,.fbar input{font-size:16px}
  .btn{font-size:12px;padding:8px 14px}
  .btn.pri{padding:10px 18px}
  #modal{width:96vw;max-height:92vh}
  .tblw{max-height:calc(100vh - 180px)!important}
}
#mnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--ink);z-index:100;border-top:1px solid rgba(255,255,255,.07)}
.mni{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;color:rgba(255,255,255,.35);font-size:9px;cursor:pointer;padding:7px 0;border:none;background:none;font-family:inherit}
.mni.on{color:var(--accent)}
.mni span:first-child{font-size:17px;line-height:1}
</style>
<script>
// Redirect to login if no API key
(function(){
  var k = localStorage.getItem('ai_key') || '';
  if(!k || !k.startsWith('sk-ant-')){
    window.location.href = 'index.html';
  }
})();
</script>
</head>
<body>

<nav id="sidebar">
  <div class="logo"><div class="logo-t">YUAN · PM</div><div class="logo-s">HW PROJECT TRACKER</div></div>
  <div class="sb-sec">views</div>
  <button class="sb-btn on" id="nb-dash" onclick="go('dash')">◈ &nbsp;Dashboard</button>
  <button class="sb-btn" id="nb-list" onclick="go('list')">≡ &nbsp;開案清單</button>
  <button class="sb-btn" id="nb-pre"  onclick="go('pre')">◎ &nbsp;前期需求</button>
  <button class="sb-btn" id="nb-inbox" onclick="go('inbox')">✎ &nbsp;快速 Inbox</button>
  <div class="sb-sec">data</div>
  <button class="sb-btn" onclick="syncGS()">↻ &nbsp;Google Sheets 同步</button>
  <button class="sb-btn" onclick="document.getElementById('xlinp').click()">📂 &nbsp;載入 Excel</button>
  <button class="sb-btn" onclick="exportXL()">💾 &nbsp;匯出 Excel</button>
  <button class="sb-btn" onclick="showConfig()">⚙ &nbsp;AI 設定 <span id="ai-ind" style="margin-left:auto;font-size:9px;color:rgba(255,255,255,.25)">○</span></button>
  <input type="file" id="xlinp" accept=".xlsx,.xls" style="display:none" onchange="loadXL(event)">
  <div class="sb-foot">
    Google Sheets 連結<br>
    <a id="gslbl" onclick="setGS()">點此設定</a>
    <div id="gs-st"></div>
  </div>
</nav>

<div id="mnav">
  <button class="mni on" id="mn-dash" onclick="go('dash')"><span>◈</span>總覽</button>
  <button class="mni" id="mn-list" onclick="go('list')"><span>≡</span>開案</button>
  <button class="mni" id="mn-pre"  onclick="go('pre')"><span>◎</span>前期</button>
  <button class="mni" id="mn-inbox" onclick="go('inbox')"><span>✎</span>Inbox</button>
  <button class="mni" onclick="syncGS()"><span>↻</span>同步</button>
  <button class="mni" onclick="showConfig()"><span>⚙</span>設定</button>
</div>

<div id="main">
  <div id="hdr">
    <div><div class="hdr-title" id="htitle">Dashboard</div><div class="hdr-sub" id="hsub">專案總覽</div></div>
    <div class="hdr-r">
      <span id="dsrc" style="font-size:10px;color:var(--text3)">內建資料</span>
      <button class="btn pri" onclick="newProj()">+ 新增開案</button>
    </div>
  </div>
  <div id="body">

    <div class="pg on" id="pg-dash">
      <div class="cards" id="stats"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
        <div><div class="sec-t">依類別</div><div id="catbars"></div></div>
        <div><div class="sec-t">Janet 的案子</div><div id="mycases"></div></div>
      </div>
      <div class="sec-t">本週更新</div><div id="weekupd"></div>
    </div>

    <div class="pg" id="pg-list">
      <div class="fbar">
        <input id="fq" placeholder="🔍 搜尋型號、編號、人員..." oninput="renderList()">
        <select id="fcat" onchange="renderList()"><option value="">全部類別</option></select>
        <select id="fst"  onchange="renderList()"><option value="">全部狀態</option><option>開案</option><option>改版</option><option>待開案</option></select>
        <select id="ftp"  onchange="renderList()"><option value="">標準/客製</option><option>標準</option><option>客製品</option></select>
        <select id="fpm"  onchange="renderList()"><option value="">全部 PM</option></select>
        <select id="fhw"  onchange="renderList()"><option value="">全部 HW</option></select>
        <select id="ft5"  onchange="renderList()"><option value="">全部</option><option value="v">⭐ Top5</option></select>
        <span class="cnt" id="lcnt"></span>
      </div>
      <div class="tblw" style="max-height:calc(100vh - 210px);overflow-y:auto">
        <table><thead><tr>
          <th>開案編號</th><th>型號</th><th>類別</th><th>型態</th>
          <th>PM</th><th>HW</th><th>狀態</th><th>⭐</th>
        </tr></thead><tbody id="ltbody"></tbody></table>
      </div>
    </div>

    <div class="pg" id="pg-pre">
      <div class="fbar">
        <input id="pfq" placeholder="🔍 搜尋..." oninput="renderPre()">
        <select id="pfst" onchange="renderPre()"><option value="">全部狀態</option><option>待處理</option><option>進行中</option><option>已完成</option><option>已轉開案</option><option>暫緩</option></select>
      </div>
      <div id="prelist"></div>
      <button class="btn pri" style="margin-top:8px" onclick="newPre()">+ 新增前期需求</button>
    </div>

    <div class="pg" id="pg-inbox">
      <div style="max-width:640px">
        <div style="background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:14px">
          <div style="font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.6">
            隨手貼入任何格式的文字：記事本、mail 內容、口語描述都可以。<br>
            <span style="color:var(--text3);font-size:11px">例：SC5C0 開案 3/10 兩週 ／ PD576 PCBA 裝UB700G HID IC ／ Layout 4/9 Janet</span>
          </div>
          <textarea id="inbox-input" rows="6" placeholder="貼上文字或隨手記錄..." style="width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;line-height:1.6"></textarea>
          <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
            <button class="btn pri" onclick="inboxParse()" id="inbox-btn">✦ AI 解析</button>
            <button class="btn" onclick="document.getElementById('inbox-input').value='';document.getElementById('inbox-result').innerHTML=''">清除</button>
            <span id="inbox-status" style="font-size:11px;color:var(--text3)"></span>
          </div>
        </div>
        <div id="inbox-result"></div>
        <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--line)">
          <div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600">INBOX 暫存區 <span id="inbox-queue-cnt"></span></div>
          <div id="inbox-queue"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="ov" onclick="if(event.target===this)closeM()">
  <div id="modal">
    <div class="mhdr">
      <div><div class="mid" id="mid"></div><div class="mtitle" id="mtitle"></div></div>
      <div class="mcls" onclick="closeM()">×</div>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

async function gsWrite(sheet,row,col,val){
  if(!SCRIPT_URL)return false;
  try{var r=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'write_cell',sheet:sheet,row:row,col:col,value:val})});var d=await r.json();return!!d.ok;}catch(e){return false;}
}
async function gsRead(sheet){
  if(!SCRIPT_URL)return null;
  try{var r=await fetch(SCRIPT_URL+'?action=read&sheet='+encodeURIComponent(sheet));var d=await r.json();return d.ok?d.data:null;}catch(e){return null;}
}

// Validate + apply AI updates to local data + Sheets
async function applyUpdates(updates,statusEl){
  var VS=['\u672a\u958b\u59cb','\u958b\u767c\u4e2d','\u6709\u624b\u7109','\u6709\u8a66\u7522','\u53ef\u9001\u6a23','\u53ef\u91cf\u5ea2','\u91cd\u65b0\u8a55\u4f30','\u6682\u505c','\u5f85\u958b\u6848','\u524d\u671f\u898f\u5283'];
  var VT=['\u5c1a\u672a','Pass','Fail'];
  var ok=0,fails=[];
  var sheetData=null;
  if(SCRIPT_URL&&updates.some(function(u){return(u.changes||[]).some(function(c){return c.field==='\u5099\u8a3b';});})){
    statusEl.innerHTML='<span style="color:var(--gold)">\u8b80\u53d6\u73fe\u6709\u5099\u8a3b...</span>';
    sheetData=await gsRead('\u958b\u6848\u6e05\u55ae');
  }
  for(var i=0;i<updates.length;i++){
    var u=updates[i];
    var p=projects.find(function(x){return x.model===u.model||x.id===u.id;});
    var sr=SR[u.model];
    for(var j=0;j<(u.changes||[]).length;j++){
      var c=u.changes[j];
      var val=c.value;
      // \u5099\u8a3b\uff1a\u6c38\u9060\u7d2f\u52a0\uff0c\u65b0\u524d\u820a\u5f8c
      if(c.field==='\u5099\u8a3b'){
        var ex='';
        if(sheetData&&sr)ex=String((sheetData[sr-1]||[])[22]||'').trim();
        else if(p)ex=(p.note||'').trim();
        val=ex?c.value+'\n'+ex:c.value;
        if(p)p.note=val;
      }
      // \u968e\u6bb5\uff1a\u9a57\u8b49\u53ef\u9078\u5024
      if(c.field==='\u968e\u6bb5'){
        if(VS.indexOf(val)<0){fails.push(u.model+'\uff5c\u968e\u6bb5\u300c'+val+'\u300d\u4e0d\u5408\u6cd5');continue;}
        if(p)p.stage=val;
      }
      // \u96fb\u6027/EMI\uff1a\u9a57\u8b49\u53ef\u9078\u5024
      if(c.field==='\u96fb\u6027\u91cf\u6e2c'||c.field==='EMI Pre-Test'){
        if(VT.indexOf(val)<0){fails.push(u.model+'\uff5c'+c.field+'\u300c'+val+'\u300d\u4e0d\u5408\u6cd5');continue;}
        if(c.field==='\u96fb\u6027\u91cf\u6e2c'&&p)p.etest=val;
        if(c.field==='EMI Pre-Test'&&p)p.emi=val;
      }
      if(c.field==='\u672c\u9031\u66f4\u65b0'&&p)p.weekUpdate=val;
      if(c.field==='\u6700\u5f8c\u66f4\u65b0\u65e5'&&p)p.lastUpdate=val;
      if(c.field==='layout'&&p)p.layout=val;
      if(c.field==='\u9001\u6d17\u8a66\u7522'&&p)p.fab=val;
      if(c.field==='\u65b0\u6599/\u6a23\u54c1'&&p)p.newParts=val;
      if(SCRIPT_URL&&sr&&c.col){
        var wrote=await gsWrite(u.sheet||'\u958b\u6848\u6e05\u55ae',sr,c.col,val);
        if(wrote)ok++;else fails.push(u.model+'\uff5c'+c.field+' \u5beb\u5165\u5931\u6557');
      }else if(SCRIPT_URL&&!sr){
        fails.push('\u627e\u4e0d\u5230\u300c'+u.model+'\u300d\u5217\u4f4d\u7f6e');
      }
    }
  }
  save();fillFilters();renderDash();renderList();
  if(!SCRIPT_URL){statusEl.innerHTML='<span style="color:var(--green)">\u2713 \u672c\u6a5f\u5df2\u66f4\u65b0</span>';}
  else if(!fails.length){statusEl.innerHTML='<span style="color:var(--green)">\u2713 \u5df2\u5beb\u5165 Sheets ('+ok+' \u6b04)</span>';}
  else{statusEl.innerHTML='<span style="color:var(--gold)">\u5b8c\u6210 '+ok+'\u6b04\uff0c\u6ce8\u610f\uff1a'+fails.join(' / ')+'</span>';}
}

// ── FILTERS ───────────────────────────────────
function fillFilters(){
  const cats=[...new Set(projects.map(p=>p.cat).filter(Boolean))];
  const pms=[...new Set(projects.map(p=>p.pm).filter(Boolean))].sort();
  const hws=[...new Set(projects.map(p=>p.hw).filter(Boolean))].sort();
  const fill=(id,arr)=>{
    const el=document.getElementById(id);if(!el)return;
    const v=el.value;
    el.innerHTML=el.options[0].outerHTML+arr.map(x=>`<option>${x}</option>`).join('');
    el.value=arr.includes(v)?v:'';
  };
  fill('fcat',cats);fill('fpm',pms);fill('fhw',hws);
}
function filtered(){
  const q=(document.getElementById('fq')?.value||'').toLowerCase();
  const cat=document.getElementById('fcat')?.value||'';
  const st=document.getElementById('fst')?.value||'';
  const tp=document.getElementById('ftp')?.value||'';
  const pm=document.getElementById('fpm')?.value||'';
  const hw=document.getElementById('fhw')?.value||'';
  const t5=document.getElementById('ft5')?.value||'';
  return projects.filter(p=>{
    if(q&&![p.id,p.model,p.pm,p.hw,p.sales,p.note].join(' ').toLowerCase().includes(q))return false;
    if(cat&&p.cat!==cat)return false;
    if(st&&p.status!==st)return false;
    if(tp&&p.type!==tp)return false;
    if(pm&&!p.pm.includes(pm))return false;
    if(hw&&!p.hw.includes(hw))return false;
    if(t5&&p.top5!=='v')return false;
    return true;
  });
}

function showP(i){
  const p=projects[i];if(!p)return;
  document.getElementById('mid').textContent=p.id;
  document.getElementById('mtitle').textContent=p.model;
  // Milestone: correct order, date-based done logic
  const today = new Date(); today.setHours(0,0,0,0);
  const parseDate = (s) => {
    if(!s || s==='尚未' || s==='—') return null;
    // formats: MM/DD, YYYY-MM-DD, M/D
    const m1 = s.match(/^(\d{1,2})\/(\d{1,2})$/);
    if(m1){ const d=new Date(today.getFullYear(),parseInt(m1[1])-1,parseInt(m1[2])); return d; }
    const m2 = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(m2){ return new Date(parseInt(m2[1]),parseInt(m2[2])-1,parseInt(m2[3])); }
    return null;
  };
  const isDone = (d) => { const dt=parseDate(d); return dt && dt <= today; };
  const isPlanned = (d) => { const dt=parseDate(d); return dt && dt > today; };

  const tl=[
    {l:'電路設計', d:p.sch},
    {l:'機構設計', d:p.mechDesign},
    {l:'Layout',   d:p.layout},
    {l:'送洗/試產', d:p.fab},
    {l:'電性量測', d:p.etest},
    {l:'EMI',      d:p.emi},
  ].filter(t => t.d && t.d !== '' && t.d !== '尚未');

  // If no milestones filled, show all as empty placeholders
  const tlShow = tl.length ? tl : [
    {l:'電路設計',d:''},{l:'Layout',d:''},{l:'送洗/試產',d:''},{l:'電性量測',d:''},{l:'EMI',d:''}
  ];

  const dotClass = (d) => isDone(d) ? 'done' : isPlanned(d) ? 'planned' : '';
  const lineClass = (d) => isDone(d) ? 'done' : '';

  document.getElementById('mbody').innerHTML=`
    <style>
      .tld.planned{background:#d4a017;border-color:#d4a017}
      .tll.planned{background:rgba(212,160,23,.3)}
    </style>
    <div class="msec"><div class="msec-t">基本資訊</div>

        <div class="mf"><label>型態</label>${fv(p.type)}</div>
        <div class="mf"><label>狀態</label>${sb(p.status)}</div>
      </div>
    </div>
    <div class="msec"><div class="msec-t">人員</div>
      <div class="mgrid">
        <div class="mf"><label>業務</label>${fv(p.sales)}</div>
        <div class="mf"><label>PM</label>${fv(p.pm)}</div>
        <div class="mf"><label>HW</label>${fv(p.hw)}</div>
      </div>
    </div>
    <div class="msec"><div class="msec-t">追蹤</div>
      <div class="mgrid">
        <div class="mf"><label>Top5</label>${p.top5==='v'?'<span style="color:var(--accent)">★ 是</span>':fv('—')}</div>
        <div class="mf"><label>白板</label>${fv(p.whiteboard||'—')}</div>
        <div class="mf"><label>Trello</label>${fv(p.trello||'—')}</div>
      </div>
    </div>
    <div class="msec"><div class="msec-t">時程里程碑</div>
      <div style="font-size:9px;color:var(--text3);margin-bottom:8px">
        <span style="display:inline-flex;align-items:center;gap:3px;margin-right:10px"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>已完成</span>
        <span style="display:inline-flex;align-items:center;gap:3px;margin-right:10px"><span style="width:8px;height:8px;border-radius:50%;background:#d4a017;display:inline-block"></span>計畫中</span>
        <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:50%;background:var(--line);display:inline-block"></span>未填</span>
      </div>
      <div class="tl">
        ${tlShow.map((t,j)=>`<div style="display:flex;align-items:center">
          <div class="tli">
            <div class="tld ${dotClass(t.d)}"></div>

          ${j<tlShow.length-1?`<div class="tll ${lineClass(t.d)}"></div>`:''}</div>`).join('')}
      </div>
    </div>
    ${p.note||p.weekUpdate?`<div class="msec"><div class="msec-t">備註</div>

// ── GOOGLE SHEETS ─────────────────────────────
function setGS(){
  const u=prompt('貼上 Google Sheets CSV 連結\n（檔案→共用→發佈到網路→選sheet→CSV格式）：',GS_URL);
  if(u===null)return;
  GS_URL=u;localStorage.setItem('gs_url',u);
  document.getElementById('gslbl').textContent=u?'已設定（點此更改）':'點此設定';
  if(u)syncGS();
}
async function syncGS(){
  if(!GS_URL){if(confirm('請先設定 Google Sheets CSV 連結，要現在設定嗎？'))setGS();return;}
  const el=document.getElementById('gs-st');
  if(!el)return;
  el.innerHTML='<span style="color:rgba(255,200,0,.8)">同步中...</span>';
  try{
    const r=await fetch(GS_URL+'&cachebust='+Date.now());
    if(!r.ok)throw new Error('無法存取（'+r.status+'），請確認共用設定');
    const csv=await r.text();
    const rows=csv.split('\n').map(row=>{
      const cols=[];let cur='',inq=false;
      for(let c of row){if(c==='"')inq=!inq;else if(c===','&&!inq){cols.push(cur.trim());cur='';}else cur+=c;}
      cols.push(cur.trim());return cols;
    });
    const np=rows.slice(2).filter(r=>r[0]&&r[0].trim()&&!r[0].trim().startsWith('  ')&&!r[0].includes('以下')).map(r=>({
      id:r[0]?.trim()||'',model:r[1]?.trim()||'',ver:r[2]?.trim()||'',cat:r[3]?.trim()||'',
      type:r[4]?.trim()||'',status:r[5]?.trim()||'',whiteboard:r[6]?.trim()||'',
      top5:r[7]?.trim()||'',trello:r[8]?.trim()||'',sales:r[9]?.trim()||'',
      pm:r[10]?.trim()||'',hw:r[11]?.trim()||'',layout:r[15]?.trim()||'',
      fab:r[16]?.trim()||'',etest:r[17]?.trim()||'',emi:r[19]?.trim()||'',
      note:r[22]?.trim()||'',weekUpdate:r[23]?.trim()||'',lastUpdate:r[24]?.trim()||''
    })).filter(p=>p.id&&p.model);
    if(!np.length)throw new Error('解析不到資料，請確認 sheet 格式');
    projects=np;save();fillFilters();renderDash();renderList();
    el.innerHTML=`<span style="color:rgba(76,175,80,.8)">✓ ${np.length}筆 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}</span>`;
    document.getElementById('dsrc').textContent='Google Sheets';
  }catch(e){el.innerHTML=`<span style="color:rgba(220,80,60,.8)">✗ ${e.message}</span>`;}
}

function loadXL(e){

  // Dynamically load SheetJS only when needed

// ── OFFLINE PARSER ────────────────────────────
function parseOffline(raw){
  const lines = raw.split(/[\n；;]+/).map(l=>l.trim()).filter(Boolean);
  const actions = [];

  // Date patterns: 3/4, 03/04, 3月4日, 4/9
  const dateRe = /(\d{1,2})[\/月](\d{1,2})[日]?/;
  const extractDate = s => {
    const m = s.match(dateRe);
    if(!m) return '';
    return String(m[1]).padStart(2,'0')+'/'+String(m[2]).padStart(2,'0');
  };

  // Week offset: N週 = today + N*7
  const weekRe = /(\d+)\s*週/;
  const addWeeks = (n) => {
    const d = new Date(); d.setDate(d.getDate() + n*7);
    return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
  };

  // Find matching project by fuzzy model name (also scan full line for model match)
  const findProj = (keyword, fullLine) => {
    if(!keyword && !fullLine) return null;
    const search = (kl) => projects.find(p =>
      p.model.toLowerCase().replace(/\s/g,'').includes(kl) ||
      p.id.toLowerCase().replace(/\s/g,'').includes(kl)
    );
    if(keyword){
      const r = search(keyword.toLowerCase().replace(/\s/g,''));
      if(r) return r;
    }
    // Also try scanning full line for any model substring match
    if(fullLine){
      const fl = fullLine.toLowerCase().replace(/\s/g,'');
      const r2 = projects.find(p => {
        const m = p.model.toLowerCase().replace(/\s/g,'');
        return m.length > 3 && fl.includes(m);
      });
      if(r2) return r2;
    }
    return null;
  };

  // Keywords
  const layoutKw  = /layout|layout了|進layout|layout完/i;
  const fabKw     = /送洗|試產|送板|fab/i;
  const etestKw   = /電性|etest|量測/i;
  const openKw    = /開案/;
  const pcbaKw    = /pcba|裝.*ic|換.*ic/i;

  for(const line of lines){
    const date  = extractDate(line);
    const wkM   = line.match(weekRe);
    const wkDate = wkM ? addWeeks(parseInt(wkM[1])) : '';

    // Try to extract model name: first token before 空白/關鍵字
    const modelM = line.match(/^([A-Za-z0-9\-\_]+)/);
    const modelRaw = modelM ? modelM[1] : '';
    const proj = findProj(modelRaw, line);

    // ── Layout update ──
    if(layoutKw.test(line)){
      const d = date || new Date().toISOString().slice(5,10).replace('-','/');
      if(proj){
        actions.push({
          action:'update_project', confidence:0.85,
          summary:`更新 ${proj.model} Layout 日期 → ${d}`,
          fields:{ id:proj.id, model:proj.model, layout:d }
        });
      } else if(modelRaw){
        actions.push({
          action:'update_project', confidence:0.6,
          summary:`找不到 ${modelRaw}，請確認型號`,
          fields:{ model:modelRaw, layout:d }
        });
      } else {
        actions.push({ action:'note', confidence:0.5, summary:'Layout 更新（未識別型號）', fields:{ content:line } });
      }
      continue;
    }

    // ── 送洗/試產 ──
    if(fabKw.test(line)){
      const d = date || wkDate;
      if(proj){
        actions.push({
          action:'update_project', confidence:0.85,
          summary:`更新 ${proj.model} 送洗/試產 → ${d||'待填'}`,
          fields:{ id:proj.id, model:proj.model, fab:d }
        });
      } else {
        actions.push({ action:'note', confidence:0.5, summary:'送洗進度（未識別型號）', fields:{ content:line } });
      }
      continue;
    }

    // ── 電性量測 ──
    if(etestKw.test(line)){
      const d = date || wkDate;
      if(proj){
        actions.push({
          action:'update_project', confidence:0.85,
          summary:`更新 ${proj.model} 電性量測 → ${d||'待填'}`,
          fields:{ id:proj.id, model:proj.model, etest:d }
        });
      } else {
        actions.push({ action:'note', confidence:0.5, summary:'電性量測（未識別型號）', fields:{ content:line } });
      }
      continue;
    }

    // ── 新增開案 ──
    if(openKw.test(line) && modelRaw){
      const d  = date;
      const wd = wkDate;
      actions.push({
        action:'new_project', confidence:0.8,
        summary:`新增開案 ${modelRaw}${d?' 開案日:'+d:''}`,
        fields:{
          model: modelRaw,
          status:'開案', cat:'', ver:'V10', pm:'Janet',
          layout: wd || '',
          note: line
        }
      });
      continue;
    }

    // ── PCBA / IC 客製需求 ──
    if(pcbaKw.test(line)){
      actions.push({
        action:'new_pre', confidence:0.75,
        summary:`前期需求：${line.slice(0,40)}`,
        fields:{ company:'內部', summary:line, srcType:'隨手記錄', pm:'Janet' }
      });
      continue;
    }

    // ── 本週更新 ──
    if(proj && (date || wkDate)){
      actions.push({
        action:'update_project', confidence:0.7,
        summary:`更新 ${proj.model} 本週紀錄`,
        fields:{ id:proj.id, model:proj.model, weekUpdate:line }
      });
      continue;
    }

    // ── Fallback: note ──
    actions.push({
      action:'note', confidence:0.4,
      summary:'無法識別，存為備忘',
      fields:{ content:line }
    });
  }

  return actions;
}

function inboxApply(i, actionStr, btn){
  let a;
  try { a = JSON.parse(actionStr); } catch(e){ alert('解析錯誤'); return; }

  // Read back any edited field values
  const fields = {};
  Object.keys(a.fields||{}).forEach(k=>{
    const el = document.getElementById(`ib-${i}-${k}`);
    fields[k] = el ? el.value : a.fields[k];
  });
  a.fields = fields;

  const result = applyAction(a);
  if(result){
    btn.textContent = '✓ 已存入';
    btn.disabled = true;
    btn.style.background = '#2d6a4f';
    save(); fillFilters(); renderDash(); renderList(); renderPre();
  }
}

function inboxApplyIdx(btn){
  const i = parseInt(btn.getAttribute('data-aidx'));
  const a = _lastActions[i];
  if(!a){ alert('找不到動作'); return; }
  // Read back edited fields
  const fields = {};
  Object.keys(a.fields||{}).forEach(k=>{
    const el = document.getElementById('ib-'+i+'-'+k);
    fields[k] = el ? el.value : a.fields[k];
  });
  a.fields = fields;
  if(applyAction(a)){
    btn.textContent = '✓ 已存入';
    btn.disabled = true;
    btn.style.background = '#2d6a4f';
    save(); fillFilters(); renderDash(); renderList(); renderPre();
  }
}

function inboxApplyAll(actionsStr){
  const actions = _lastActions;
  let count = 0;
  actions.forEach((a,i)=>{
    const fields = {};
    Object.keys(a.fields||{}).forEach(k=>{
      const el = document.getElementById('ib-'+i+'-'+k);
      fields[k] = el ? el.value : a.fields[k];
    });
    a.fields = fields;
    if(applyAction(a)) count++;
  });
  save(); fillFilters(); renderDash(); renderList(); renderPre();
  alert(`✓ 已存入 ${count} 個動作`);
}

function applyAction(a){
  const f = a.fields || {};
  if(a.action === 'new_project'){
    if(!f.model){ alert('缺少型號，無法新增'); return false; }
    projects.unshift({
      id: f.id || 'RF-'+new Date().toISOString().slice(2,10).replace(/-/g,''),
      model: f.model||'', ver: f.ver||'V10', cat: f.cat||'',
      type: f.type||'標準', status: f.status||'開案',
      pm: f.pm||'Janet', hw: f.hw||'', sales: f.sales||'',
      layout: f.layout||'', fab: f.fab||'', etest:'', emi:'',
      top5:'', whiteboard:'', trello:'',
      note: f.note||'', weekUpdate: f.weekUpdate||'',
      lastUpdate: new Date().toISOString().slice(0,10)
    });
    return true;
  }
  if(a.action === 'update_project'){
    const key = f.id || f.model;
    const p = projects.find(x => x.id===key || x.model===key ||
      (key && (x.id.toLowerCase().includes(key.toLowerCase()) || x.model.toLowerCase().includes(key.toLowerCase()))));
    if(!p){ alert(`找不到案子：${key}`); return false; }
    const skip = ['id','model'];
    Object.entries(f).forEach(([k,v])=>{ if(!skip.includes(k) && v) p[k]=v; });
    return true;
  }
  if(a.action === 'new_pre'){
    pre.unshift({
      id: 'PRE-'+String(pre.length+1).padStart(3,'0'),
      date: new Date().toISOString().slice(0,10),
      srcType: f.srcType||'手動記錄',
      company: f.company||'—',
      summary: f.summary||'',
      followup:'', deadline: f.deadline||'',
      progress:'', sales:'', pm: f.pm||'Janet',
      pstatus:'待處理', relatedId:'', note:''
    });
    return true;
  }
  if(a.action === 'note'){
    // Save to inboxQueue as a note, NOT into pre array
    inboxQueue.unshift({
      raw: f.content || '',
      savedAt: new Date().toLocaleString('zh-TW'),
      isNote: true
    });
    saveQueue(); renderQueue();
    return true;
  }
  return false;
}

init();
renderQueue();
</script>
