<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YUAN PM Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1923;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#17202a;border:1px solid #2a3540;border-radius:16px;padding:36px 28px;width:100%;max-width:380px}
.logo{text-align:center;margin-bottom:28px}
.logo-t{font-size:22px;font-weight:800;color:#fff;letter-spacing:2px}
.logo-s{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:3px;margin-top:4px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:rgba(255,255,255,.4);margin-bottom:6px;letter-spacing:.5px}
.field input{width:100%;background:#0f1923;border:1px solid #2a3540;border-radius:8px;padding:12px 14px;color:#fff;font-size:16px;outline:none;transition:border-color .2s}
.field input:focus{border-color:#7c6aff}
.field input::placeholder{color:rgba(255,255,255,.2)}
.btn{width:100%;background:#7c6aff;color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn:active{opacity:.8}
.hint{font-size:11px;color:rgba(255,255,255,.25);text-align:center;margin-top:16px;line-height:1.7}
.err{color:#f87171;font-size:12px;text-align:center;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-t">YUAN · PM</div>
    <div class="logo-s">HW PROJECT TRACKER</div>
  </div>
  <div class="field">
    <label>ANTHROPIC API KEY</label>
    <input type="password" id="apikey" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="field">
    <label>APPS SCRIPT URL（選填）</label>
    <input type="text" id="scripturl" placeholder="https://script.google.com/macros/s/..." autocomplete="off">
  </div>
  <button class="btn" onclick="enter()">進入 Tracker</button>
  <div class="err" id="err">API Key 格式不正確，請確認</div>
  <div class="hint">
    Key 只存在你的瀏覽器，不會上傳到任何地方<br>
    下次開啟會自動記住
  </div>
</div>
<script>
// Auto-fill if already saved
window.onload = function(){
  var k = localStorage.getItem('ai_key') || '';
  var u = localStorage.getItem('script_url') || '';
  if(k) document.getElementById('apikey').value = k;
  if(u) document.getElementById('scripturl').value = u;
  // Auto-enter if key already saved
  if(k && k.startsWith('sk-ant-')) {
    window.location.href = 'tracker.html';
  }
};

function enter(){
  var key = document.getElementById('apikey').value.trim();
  var url = document.getElementById('scripturl').value.trim();
  var err = document.getElementById('err');
  if(!key || !key.startsWith('sk-ant-')){
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  localStorage.setItem('ai_key', key);
  if(url) localStorage.setItem('script_url', url);
  window.location.href = 'tracker.html';
}

document.addEventListener('keydown', function(e){
  if(e.key === 'Enter') enter();
});
</script>
</body>
</html>
